# ============================================================================
# AutoGluon GT mask 验证配置
# ============================================================================
# 与 config.yaml 唯一区别: use_dino_mask_for_cls = false
# autogluon 直接使用 GT mask（datasets.binary_masks / tirads_masks）而非 dinov3_unet 预测掩码
#
# 用法:
#   python run_all.py --config config_gt_mask.yaml --tasks binary --models autogluon
#   python run_all.py --config config_gt_mask.yaml --tasks tirads --models autogluon
#   python run_all.py --config config_gt_mask.yaml --tasks binary tirads --models autogluon
# ============================================================================

# --- 数据集路径 ---
datasets:
  gland_images:  /mnt/wangbd8/workspace/DataSets/ThyroidAgent/train_val_test/TGVideo_PNG/sample/images
  gland_masks:   /mnt/wangbd8/workspace/DataSets/ThyroidAgent/train_val_test/TGVideo_PNG/sample/masks
  nodule_images: /mnt/wangbd8/workspace/DataSets/ThyroidAgent/train_val_test/sample/images
  nodule_masks:  /mnt/wangbd8/workspace/DataSets/ThyroidAgent/train_val_test/sample/masks
  binary_images: /mnt/wangbd8/workspace/DataSets/ThyroidAgent/train_val_test/TN3K/test/images
  binary_masks:  /mnt/wangbd8/workspace/DataSets/ThyroidAgent/train_val_test/TN3K/test/masks
  tirads_images: /mnt/wangbd8/workspace/DataSets/ThyroidAgent/train_val_test/Cine-Clip/sample/images
  tirads_masks:  /mnt/wangbd8/workspace/DataSets/ThyroidAgent/train_val_test/Cine-Clip/sample/masks

# --- 标签文件 ---
labels:
  binary_json:  /mnt/wangbd8/workspace/DataSets/ThyroidAgent/train_val_test/TN3K/test/TN3K_test_label.json
  binary_field: malignancy
  tirads_json:  /mnt/wangbd8/workspace/DataSets/ThyroidAgent/train_val_test/Cine-Clip/sample/Cine-Clip_sample_label.json
  tirads_field: tirads

# --- 模型权重 ---
weights:
  # 分割 — 腺体
  gland:
    dinov3_unet: ./infer_dinov3_unet/checkpoints/TGVideo/dino_unet_train_TGVideo_epoch_30.pth
    medsam2:     ./infer_medsam2/checkpoints/TGVideo/checkpoint_10.pt
    medsegx:     ./infer_medsegx/checkpoints/TGVideo/checkpoint_epoch_29.pth
    transunet:   ./infer_transunet/checkpoints/TGVideo/epoch_49.pth
    ultrafedfm:  ./infer_ultrafedfm/checkpoints/epoch_bestDice.pth

  # 分割 — 结节
  nodule:
    dinov3_unet: ./infer_dinov3_unet/checkpoints/Nodule/dino_unet_train_dataset_4_epoch_50.pth
    medsam2:     ./infer_medsam2/checkpoints/Nodule/checkpoint_15.pt
    medsegx:     ./infer_medsegx/checkpoints/Nodule/model_best.pth
    transunet:   ./infer_transunet/checkpoints/Nodule/epoch_49.pth
    ultrafedfm:  ./infer_ultrafedfm/checkpoints/epoch_bestDice.pth

  # 分类 — 良恶性二分类
  binary:
    biomedclip:            ./infer_biomedclip/checkpoints/BM_2cls/best_model.pth
    medsiglip:             ./infer_medsiglip/checkpoints/BM_2cls/best_model.pt
    ultrafedfm:            ./infer_ultrafedfm/checkpoints/checkpoint-best_auroc.pth
    dinov3_unet_multitask: ./infer_dinov3_unet_multitask/checkpoints/BM_2cls/dino_unet_gamtl_train_multitask_dataset_3_epoch_50.pth
    autogluon:             /mnt/wangbd8/workspace/ThyroidAgent/dino_unet_multitask/pyradiomics_train/autogluon_model/gtmask/dataset_3/autogluon_model_20260106_215755

  # 分类 — TIRADS 五分类
  tirads:
    biomedclip:            ./infer_biomedclip/checkpoints/TIRADS_5cls/best_model.pth
    medsiglip:             ./infer_medsiglip/checkpoints/TIRADS_5cls/best_model.pt
    ultrafedfm:            ./infer_ultrafedfm/checkpoints/checkpoint-best_auroc.pth
    dinov3_unet_multitask: ./infer_dinov3_unet_multitask/checkpoints/TIRADS_5cls/dino_unet_train_TIRADS_Cine-Clip_epoch_50.pth
    autogluon:             ./infer_autogluon/checkpoints/binary

# --- 预训练骨干模型目录 ---
pretrained:
  biomedclip_dir:  ./infer_biomedclip/pretrained_models/biomedclip
  medsiglip_dir:   ./infer_medsiglip/pretrained_models/medsiglip-448
  medsegx_sam_dir: ./infer_medsegx/pretrained_models/SAM
  medsam2_config:  ./infer_medsam2/sam2/configs/sam2.1_hiera_t512.yaml
  radiomics_params: ./infer_autogluon/radiomics_2d.yaml

# --- 预训练模式权重 ---
pretrained_weights:
  gland:
    medsam2: ./infer_medsam2/checkpoints/MedSAM2_latest.pt
    medsegx: ./infer_medsegx/checkpoints/medsegx_vit_b.pth
  nodule:
    medsam2: ./infer_medsam2/checkpoints/MedSAM2_latest.pt
    medsegx: ./infer_medsegx/checkpoints/medsegx_vit_b.pth

# --- 输出根目录 ---
output_root: ./results_gt_mask

# --- 输出选项 ---
save_masks: false

# 关键: false = 使用 GT mask 而非 dinov3_unet 预测掩码
use_dino_mask_for_cls: false

# --- 通用参数 ---
device: cuda
n_bootstrap: 2000
