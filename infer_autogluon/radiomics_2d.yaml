# 2D Radiomics config for AutoGluon inference
# 与 pyradiomics_train/radiomics_2d.yaml 一致

setting:
  resampledPixelSpacing: null
  interpolator: sitkBSpline
  preCrop: false
  normalize: false
  removeOutliers: null
  binWidth: 25
  correctMask: true
  label: 1
  force2D: true
  force2Ddimension: 0
  symmetricalGLCM: true

imageType:
  Original: {}

featureClass:
  firstorder: []
  glcm:
    - Autocorrelation
    - JointAverage
    - ClusterProminence
    - ClusterShade
    - ClusterTendency
    - Contrast
    - Correlation
    - DifferenceAverage
    - DifferenceEntropy
    - DifferenceVariance
    - JointEnergy
    - JointEntropy
    - Imc1
    - Imc2
    - Idm
    - Idmn
    - Id
    - Idn
    - InverseVariance
    - MaximumProbability
    - SumEntropy
    - SumSquares
  glrlm: []
  glszm: []
  gldm: []
  ngtdm: []
  shape2D: []
